# Setup
title: Chirayu Rankawat
description: Tinkerer, maker & roboticist with a knack for adventure sports.
url: https://chirayur.github.io
avatar: /avatar.jpg
paginate: 5
permalink: pretty
cover_image: /bg.jpg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: ChirayuR
  card: summary
logo: Chirayu-R_blog3.png
social:
  name: Chirayu Rankawat
  links:
    - https://github.com/ChirayuR
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Chirayu Rankawat
  url: https://github.com/ChirayuR/
  email: chirayurankawat+gitblog@gmail.com
